name: Claude AI Assistant

# 触发条件：当 Issue 或 Pull Request 中有新评论时
on:
  issue_comment:
    types: [created]

jobs:
  claude-response:
    runs-on: ubuntu-latest
    
    # 【安全拦截】只有评论内容包含 "@claude" 时才会触发此任务
    # 注意：如果你的习惯是 @机器人名字，请把这里的 @claude 换成你的机器人名字
    if: contains(github.event.comment.body, '@claude')
    
    steps:
      # 第 1 步：将仓库代码拉取到当前运行的虚拟服务器中，以便 Claude 可以读取
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 第 2 步：使用你的 GitHub App 凭证，换取具有高权限的临时 Token
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # 第 3 步：召唤 Claude 处理任务
      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          # 👇 【必须修改】将双引号里的网址，替换成你购买的第三方 API 代理的实际地址
          ANTHROPIC_BASE_URL: "https://api.deepseek.com/anthropic" 
        with:
          # 读取你在 GitHub Secrets 中配置的第三方 API Key
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # 传入第 2 步获取到的高权限临时 Token
          github_token: ${{ steps.app-token.outputs.token }}
          
          # 选填：如果你的第三方代理要求强制指定某个模型名称，可以取消下面两行的注释并修改
          claude_env: |
          MODEL: "DeepSeek-V3.2"
