name: Claude AI Assistant

# 触发条件：当 Issue 或 Pull Request 中有新评论时
on:
  issue_comment:
    types: [created]

jobs:
  claude-response:
    runs-on: ubuntu-latest
    
    # 【安全拦截】只有评论内容包含 "@claude" 时才会触发此任务
    if: contains(github.event.comment.body, '@Ruige Claude Assistant')
    
    steps:
      # 第 1 步：将仓库代码拉取到当前运行的虚拟服务器中
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 第 2 步：使用 GitHub App 凭证，换取临时 Token
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # 第 3 步：召唤 AI（此处已接管为 DeepSeek）
      - name: Run AI Code Assistant
        uses: anthropics/claude-code-action@v1
        env:
          # DeepSeek 官方的 Anthropic 兼容接口
          ANTHROPIC_BASE_URL: "https://api.deepseek.com/anthropic"
          # 强制指定调用的模型为 deepseek-chat
          ANTHROPIC_MODEL: "deepseek-chat"
        with:
          # 注意：记得把你的 DeepSeek API Key 存入 GitHub Secrets 的 ANTHROPIC_API_KEY 中
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
